<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🇩🇪 Bundesmarkt 1992 — официальный магазин Германии</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            padding-bottom: 80px;
        }
        .header {
            background: #111;
            border-bottom: 3px solid #d4af37;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            background: rgba(17,17,17,0.95);
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p { font-size: 0.8rem; color: #d4af37; }
        .cart-icon {
            background: #1f1f1f;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #d4af37;
            display: flex;
            gap: 8px;
            font-weight: bold;
        }
        .cart-count {
            background: #d4af37;
            color: #111;
            border-radius: 50%;
            padding: 2px 8px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 1rem 1rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #1f1f1f;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            cursor: pointer;
            color: #ccc;
            font-weight: bold;
            font-size: 1rem;
        }
        .tab-btn.active {
            background: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        .subcategory-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin: 1rem;
        }
        .subcat-btn {
            background: #2a2a2a;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            color: #ddd;
            font-size: 0.85rem;
        }
        .subcat-btn.active-sub {
            background: #d4af37;
            color: #111;
        }
        .products-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
        }
        .product-card {
            background: #151515;
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid #2c2c2c;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-6px);
            border-color: #d4af37;
        }
        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            background: #2c2c2c;
        }
        .product-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 8px 0 4px;
        }
        .product-desc {
            font-size: 0.8rem;
            color: #aaa;
            flex-grow: 1;
        }
        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #d4af37;
            margin: 8px 0;
        }
        .add-to-cart {
            background: #2c2c2c;
            border: 1px solid #d4af37;
            padding: 8px;
            border-radius: 30px;
            cursor: pointer;
            color: #d4af37;
            font-weight: bold;
            width: 100%;
        }
        .add-to-cart:hover {
            background: #d4af37;
            color: #111;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: 24px;
            padding: 24px;
            overflow-y: auto;
            border: 1px solid #d4af37;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #ccc;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
            gap: 10px;
        }
        .cart-item-qty button {
            background: #333;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .cart-total {
            text-align: right;
            font-size: 1.5rem;
            margin: 20px 0;
            padding-top: 12px;
            border-top: 2px solid #d4af37;
        }
        .checkout-btn {
            background: #d4af37;
            color: #111;
            border: none;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
        }
        .form-group {
            margin: 15px 0;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: #2c2c2c;
            border: 1px solid #555;
            color: white;
            border-radius: 8px;
            font-family: monospace;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #555;
        }
        @media (max-width: 700px) {
            .category-grid { grid-template-columns: 1fr; }
            .cart-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>

<div class="header">
    <div class="logo">
        <h1>🇩🇪 BUNDESMARKT 1992</h1>
        <p>Made in Germany — официальный импортёр</p>
    </div>
    <div class="cart-icon" id="cartIcon">
        🛒 Корзина
        <span class="cart-count" id="cartCount">0</span>
    </div>
</div>

<div class="tabs" id="mainTabs">
    <button class="tab-btn active" data-cat="autos">🚗 Автомобили</button>
    <button class="tab-btn" data-cat="music">🎸 Музыка & Thomann</button>
    <button class="tab-btn" data-cat="military">⚔️ Военная продукция</button>
</div>

<div id="subcategoryBar" class="subcategory-bar"></div>
<div id="productsContainer" class="products-container"></div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Ваша корзина</h2>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div id="cartItemsList"></div>
        <div id="cartTotal" class="cart-total">Итого: 0 DM</div>
        <div class="form-group">
            <label>Discord ник (обязательно)</label>
            <input type="text" id="discordName" placeholder="username#1234">
        </div>
        <div class="form-group">
            <label>Страна / город доставки</label>
            <input type="text" id="deliveryCountry" placeholder="Франция, Польша, США...">
        </div>
        <div class="form-group">
            <label>Комментарий к заказу</label>
            <input type="text" id="orderComment" placeholder="Особые пожелания...">
        </div>
        <button class="checkout-btn" id="checkoutBtn">✅ Оформить заказ</button>
        <div id="orderMessage" style="margin-top: 12px; text-align: center;"></div>
    </div>
</div>

<footer>© 1992 Bundesrepublik Deutschland — все цены в немецких марках (DM). Доставка по согласованию.</footer>

                { id: "w5", name: "Mauser SP66", desc: "Снайперская .308", price: 6800, imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Mauser_SP66.jpg/300px-Mauser_SP66.jpg", company: "Оружие (госзакупки)", govOnly: true },
                { id: "w6", name: "Leopard 2A4", desc: "ОБТ, 120 мм пушка", price: 3500000, imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Leopard_2A4.jpg/300px-Leopard_2A4.jpg", company: "Техника", govOnly: true },
                { id: "w7", name: "TPz Fuchs 1", desc: "Бронетранспортёр РХБ", price: 800000, imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Fuchs.jpg/300px-Fuchs.jpg", company: "Техника", govOnly: true },
                { id: "w8", name: "Mercedes 250 GD Wolf", desc: "Военный внедорожник", price: 85000, imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Mercedes_Wolf.jpg/300px-Mercedes_Wolf.jpg", company: "Техника" },
                { id: "w9", name: "BW полевая куртка Strichtarn", desc: "Оригинал NVA", price: 25, imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Strichtarn.jpg/300px-Strichtarn.jpg", company: "Снаряжение и форма" },
                { id: "w10", name: "BW рюкзак 50L", desc: "Бундесвер, б/у", price: 35, imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/BW_Rucksack.jpg/300px-BW_Rucksack.jpg", company: "Снаряжение и форма" },
                { id: "w11", name: "Mil-Tec тактические штаны", desc: "Копия BW", price: 59, imageUrl: "https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?w=300&h=200&fit=crop", company: "Снаряжение и форма" },
                { id: "w12", name: "Кожаная кобура Lindner & Fischer", desc: "Ручная работа", price: 89, imageUrl: "https://images.unsplash.com/photo-1595079676889-3b8d9e6e7f1a?w=300&h=200&fit=crop", company: "Снаряжение и форма" },
                { id: "w13", name: "Шлем M1 реплика", desc: "Стальной", price: 79, imageUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/M1_Helmet.jpg/300px-M1_Helmet.jpg", company: "Снаряжение и форма" },
                { id: "w14", name: "Фляжка армейская 1L", desc: "Алюминий, чехол", price: 15, imageUrl: "https://images.unsplash.com/photo-1601314002592-b8734bcaa4a3?w=300&h=200&fit=crop", company: "Снаряжение и форма" },
                { id: "w15", name: "Палатка BW 2-местная", desc: "Брезент", price: 120, imageUrl: "https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=300&h=200&fit=crop", company: "Снаряжение и форма" }
            ]
        }
    };

    // Собираем плоский словарь для быстрого доступа к товарам по id
    const allProductsById = {};
    for (let cat in PRODUCTS) {
        PRODUCTS[cat].items.forEach(p => { allProductsById[p.id] = p; });
    }

    // --------------------------------------------------------------
    // 2. КОРЗИНА (localStorage)
    // --------------------------------------------------------------
    let cart = {};

    function saveCart() {
        localStorage.setItem("bundesmarkt_cart", JSON.stringify(cart));
        updateCartUI();
    }

    function loadCart() {
        const saved = localStorage.getItem("bundesmarkt_cart");
        cart = saved ? JSON.parse(saved) : {};
        updateCartUI();
    }

    function addToCart(id) {
        const product = allProductsById[id];
        if (!product) return;
        if (cart[id]) cart[id].quantity++;
        else cart[id] = { id, name: product.name, price: product.price, quantity: 1 };
        saveCart();
        showToast("✅ Товар добавлен в корзину", 1500);
    }

    function removeFromCart(id) {
        delete cart[id];
        saveCart();
    }

    function changeQuantity(id, delta) {
        if (!cart[id]) return;
        let newQty = cart[id].quantity + delta;
        if (newQty <= 0) delete cart[id];
        else cart[id].quantity = newQty;
        saveCart();
    }

    function getCartTotal() {
        return Object.values(cart).reduce((sum, item) => sum + item.price * item.quantity, 0);
    }

    function getCartCount() {
        return Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
    }

    // --------------------------------------------------------------
    // 3. ОТРИСОВКА UI (категории, субкатегории, товары, корзина)
    // --------------------------------------------------------------
    let currentCategory = "autos";
    let currentSub = null;

    function renderSubcategories() {
        const bar = document.getElementById("subcategoryBar");
        const subs = PRODUCTS[currentCategory].subcategories;
        if (!subs) { bar.innerHTML = ""; return; }
        let html = `<button class="subcat-btn ${!currentSub ? 'active-sub' : ''}" data-sub="all">📋 Все</button>`;
        for (let [name, key] of Object.entries(subs)) {
            html += `<button class="subcat-btn ${currentSub === key ? 'active-sub' : ''}" data-sub="${key}">${name}</button>`;
        }
        bar.innerHTML = html;
        document.querySelectorAll(".subcat-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const val = btn.getAttribute("data-sub");
                currentSub = val === "all" ? null : val;
                renderProducts();
                renderSubcategories(); // обновить активный класс
            });
        });
    }

    function renderProducts() {
        const container = document.getElementById("productsContainer");
        let items = PRODUCTS[currentCategory].items;
        if (currentSub) {
            let targetCompany = null;
            for (let [name, key] of Object.entries(PRODUCTS[currentCategory].subcategories)) {
                if (key === currentSub) targetCompany = name;
            }
            if (targetCompany) items = items.filter(p => p.company === targetCompany);
        }
        if (!items.length) {
            container.innerHTML = "<p style='text-align:center'>❌ Нет товаров в этой категории.</p>";
            return;
        }
        let html = '<div class="category-grid">';
        items.forEach(p => {
            html += `
                <div class="product-card">
                    <img class="product-image" src="${p.imageUrl || 'https://via.placeholder.com/300x180?text=No+Image'}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x180?text=Image+not+found'">
                    <div class="product-title">${p.name} ${p.govOnly ? '🔒' : ''}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="product-price">${p.price.toLocaleString()} DM</div>
                    <button class="add-to-cart" data-id="${p.id}">➕ В корзину</button>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
        container.querySelectorAll(".add-to-cart").forEach(btn => {
            btn.addEventListener("click", () => addToCart(btn.getAttribute("data-id")));
        });
    }

    function renderCartModal() {
        const container = document.getElementById("cartItemsList");
        const items = Object.values(cart);
        if (items.length === 0) {
            container.innerHTML = "<p>🛒 Корзина пуста. Добавьте товары из каталога.</p>";
            document.getElementById("cartTotal").innerHTML = "Итого: 0 DM";
            return;
        }
        let html = "";
        items.forEach(item => {
            html += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <strong>${item.name}</strong><br>
                        ${item.price} DM × ${item.quantity}
                    </div>
                    <div class="cart-item-qty">
                        <button onclick="changeQuantity('${item.id}', -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="changeQuantity('${item.id}', 1)">+</button>
                    </div>
                    <div>${(item.price * item.quantity).toLocaleString()} DM</div>
                    <button onclick="removeFromCart('${item.id}')" style="background:#661111; border:none; padding:4px 12px; border-radius:20px;">🗑️ Удалить</button>
                </div>
            `;
        });
        container.innerHTML = html;
        document.getElementById("cartTotal").innerHTML = `Итого: ${getCartTotal().toLocaleString()} DM`;
    }

    function updateCartUI() {
        document.getElementById("cartCount").innerText = getCartCount();
        if (document.getElementById("cartModal").style.display === "flex") renderCartModal();
    }

    function showToast(msg, duration) {
        const msgDiv = document.getElementById("orderMessage");
        if (msgDiv) {
            msgDiv.innerText = msg;
            msgDiv.style.background = "#2c5a2c";
            msgDiv.style.padding = "8px";
            msgDiv.style.borderRadius = "8px";
            setTimeout(() => {
                msgDiv.innerText = "";
                msgDiv.style.background = "";
                msgDiv.style.padding = "0";
            }, duration);
        } else {
            alert(msg);
        }
    }

    // --------------------------------------------------------------
    // 4. ОТПРАВКА ЗАКАЗА НА СЕРВЕР (и создание чека)
    // --------------------------------------------------------------
    // ⚠️ ЗАМЕНИТЕ ЭТУ ССЫЛКУ НА РЕАЛЬНЫЙ URL ВАШЕГО СЕРВЕРА (Render)
    const BACKEND_URL = "https://ваш-сервер.onrender.com/order";  // <--- ИЗМЕНИТЕ

    async function submitOrder() {
        const discord = document.getElementById("discordName").value.trim();
        const country = document.getElementById("deliveryCountry").value.trim();
        const comment = document.getElementById("orderComment").value.trim();
        if (!discord || !country) {
            showToast("❌ Укажите Discord ник и страну доставки!", 3000);
            return;
        }
        if (Object.keys(cart).length === 0) {
            showToast("❌ Корзина пуста!", 2000);
            return;
        }
        const itemsList = Object.values(cart).map(i => `${i.name} x${i.quantity} = ${(i.price*i.quantity).toLocaleString()} DM`).join("\n");
        const total = getCartTotal();
        const rawText = `Товары:\n${itemsList}\nИТОГО: ${total.toLocaleString()} DM`;
        const payload = {
            discord: discord,
            country: country,
            comment: comment,
            cart: cart,
            total: total,
            rawText: rawText
        };
        try {
            const response = await fetch(BACKEND_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                showToast("✅ Заказ отправлен! Чек будет отправлен владельцу в личку.", 4000);
                cart = {};
                saveCart();
                document.getElementById("discordName").value = "";
                document.getElementById("deliveryCountry").value = "";
                document.getElementById("orderComment").value = "";
                document.getElementById("cartModal").style.display = "none";
            } else {
                showToast("⚠️ Ошибка сервера. Попробуйте позже.", 3000);
            }
        } catch (err) {
            console.error(err);
            showToast("⚠️ Не удалось соединиться с сервером. Заказ сохранён в корзине.", 3000);
        }
    }

    // --------------------------------------------------------------
    // 5. ИНИЦИАЛИЗАЦИЯ (переключение вкладок, модальное окно)
    // --------------------------------------------------------------
    function init() {
        loadCart();

        // Переключение основных категорий
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                currentCategory = btn.getAttribute("data-cat");
                currentSub = null;
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                renderSubcategories();
                renderProducts();
            });
        });

        // Модальное окно корзины
        const modal = document.getElementById("cartModal");
        const cartIcon = document.getElementById("cartIcon");
        const closeBtn = document.getElementById("closeModalBtn");
        cartIcon.onclick = () => {
            renderCartModal();
            modal.style.display = "flex";
        };
        closeBtn.onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
        document.getElementById("checkoutBtn").onclick = submitOrder;

        renderSubcategories();
        renderProducts();
    }

    // Делаем функции глобальными для вызова из onclick (changeQuantity, removeFromCart)
    window.changeQuantity = changeQuantity;
    window.removeFromCart = removeFromCart;

    init();
</script>
</body>
